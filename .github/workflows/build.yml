name: Build EncFS MP CLI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ------------------------------------------------------------------
  # Windows build (produces encfsmp_cli.exe for Windows 11)
  # ------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 / MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: |
          cd build
          mingw32-make -j$(nproc)

      - name: Strip & package
        run: |
          strip build/encfsmp_cli.exe
          mkdir -p dist/bin
          cp build/encfsmp_cli.exe dist/bin/
          cp README.md dist/ 2>/dev/null || true
          cd dist
          powershell -Command "Compress-Archive -Path bin,README.md -DestinationPath ../encfsmp-cli-win-x64.zip -Force"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: encfsmp-cli-windows-x64
          path: encfsmp-cli-win-x64.zip

  # ------------------------------------------------------------------
  # Linux build
  # ------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make libssl-dev libboost-all-dev

      - name: Configure & build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Quick smoke test
        run: |
          cd build
          ./encfsmp_cli --help | head -5
          cd /tmp
          rm -rf smoke_test && mkdir smoke_test && cd smoke_test
          echo "hello smoke test" > in.txt
          $GITHUB_WORKSPACE/build/encfsmp_cli create vault -p "test123"
          $GITHUB_WORKSPACE/build/encfsmp_cli put vault in.txt hello.txt -p "test123"
          $GITHUB_WORKSPACE/build/encfsmp_cli get vault hello.txt out.txt -p "test123"
          diff -q in.txt out.txt && echo "SMOKE TEST PASSED"

      - name: Package
        run: |
          mkdir -p dist/bin
          cp build/encfsmp_cli dist/bin/
          strip dist/bin/encfsmp_cli
          tar czf encfsmp-cli-linux-x86_64.tar.gz -C dist bin

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: encfsmp-cli-linux-x64
          path: encfsmp-cli-linux-x86_64.tar.gz
